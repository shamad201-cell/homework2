<!DOCTYPE html>
<!--
Program name: patient-form.html
Author: Sarah Hamad
Date created: 06/16/26
Date last edited: 06/25/26
Version: 1.0
Description:  I will be creating a Patient Registration
Form. The page has a form on it to register a 
new account and capture demographic data.
--> 
<html lang="en">
    <head>
        <link rel="stylesheet" href="style2.css">

        <title>Patient Registration Form | Houston Medical Systems</title>
    </head>
    <body>
        <header>
           <table width="100%">
               <tr>
                   <td valign="top" align="left" width="20%"> 
                    <div class="image"> 
                        <img align="center" src="medpic2.png" alt="Houston Medical Systems Logo" width="70px" id="logo" />
                        </div>
                        <td> 

                        <td>
                            <h1>Houston Medical Systems</h1>  
                        <td>

                        <td valign="bottom" align="right" width="20%"> 
                              Today's Date: <span id="date"></span>
                        </td>
               </tr>
           </table>
        </header>   
<hr>
<form name = "patientForm" id="patientForm" action="thankyou2.html">
<center>
      <div class="format>
       <table> 
        <tr>
            <th colspan="4" > Patient Demographics</th>
        </tr>
<br>
<br>
<br>
        <tr>
            <td class="td1"><label for="firstName">First Name:</label></td>
            <td>
                <input type="text" 
                name="firstName"
                id="firstName" 
                maxlength="30"
                title="Letters, apostrophes and dashes only"
                pattern="[a-zA-Z']{2,30}"
                onblur="validateFirstName()"
                required
                placeholder="First Name"/>

                <br>
                <span class="error" id="firstNameError"></span>
                
            </td>
        </tr>
        <tr>
            <td class="td1"><label for="middleName">Middle Initial:</label></td>
            <td>
                <input type="text" 
                name="middleName"
                id="middleName" 
                maxlength="1"
                minlength="1"
                style="width: 30px;"
                title="Letters only"
                pattern="[a-zA-Z']{0-1}"
                onblur="validateMiddleName()"
                placeholder="M"/>

                <br>
                <span class="error" id="middleNameError"></span>
                
            </td>
        </tr>
        <tr>
            <td class="td1"><label for="lastName">Last Name:</label></td>
            <td>
                <input type="text" 
                name="lastName"
                id="lastName" 
                maxlength="30"
                title="letters, apostrophes and dashes only"
                pattern="[a-zA-Z']{1-30}"
                onblur="validateLastName()"
                required
                placeholder="Last Name"/>

                <br>
                <span class="error" id="lastNameError"></span>
                
            </td>
        </tr> 
      <br>
      <br>

        <tr> 
            <td class="td1"><label for="dob">Date of Birth:</label></td>
            <td>
                <input
                 type="date" 
                 id="dob"
                 name="dob"
                 onblur="validateDOB()"
                 required
                 />
                <br>
                <span class="error" id="dobError"></span>
            </td>
        </tr>

        <tr>
            <td class="td1"><label for="ssn">Social Security Number:</label></td>
            <td>
                <input 
                type="password" 
                minlength="11"
                maxlength="11"
                name="ssn"
                id="ssn" 
                required
                title="Numbers only"
                required
                placeholder="XXX-XX-XXXX"
                onblur="validateSSN()"
                />
                <br>
                <span class="error" id="ssnError"></span>
            </td>
        </tr>

        <tr> 
            <th colspan="4"><hr></th>

        </tr>

        <tr>
            <td class="td1"><label for="address"> Address:</label></td>
            <td>
                <input type="text" 
                name="address"
                id="address" 
                maxlength="30"
                title="letters, dashes, and apostrophes only"
                required
                placeholder="Address"
                onblur="validateAddress()"
                />
                <br>
                <span class="error" id="addressError"></span>
            
            </td>
        </tr> 
        <tr>
            <td class="td1"><label for="city">City:</label></td>
            <td>
                <input type="text" 
                name="city"
                id="city" 
                maxlength="30"
                title="Enter your city"
                required
                placeholder="City"
                onblur="validateCity()"
                />
                <br>
                <span class="error" id="cityError"></span>
                
            </td>
        </tr>

        <tr>
            <td><label for="state">State:</label></td>
            <td>
                <select name="state" id="state" required>
                    <option value="">Select State</option>
                    <option value="AL">Alabama</option>
                    <option value="AK">Alaska</option>
                    <option value="AZ">Arizona</option>
                    <option value="AR">Arkansas</option>
                    <option value="CA">California</option>
                    <option value="CO">Colorado</option>
                    <option value="CT">Connecticut</option>
                    <option value="DE">Delaware</option>
                    <option value="FL">Florida</option>
                    <option value="GA">Georgia</option>
                    <option value="HI">Hawaii</option>
                    <option value="ID">Idaho</option>
                    <option value="IL">Illinois</option>
                    <option value="IN">Indiana</option>
                    <option value="IA">Iowa</option>
                    <option value="KS">Kansas</option>
                    <option value="KY">Kentucky</option>
                    <option value="LA">Louisiana</option>
                    <option value="ME">Maine</option>
                    <option value="MD">Maryland</option>
                    <option value="MA">Massachusetts</option>
                    <option value="MI">Michigan</option>
                    <option value="MN">Minnesota</option>
                    <option value="MS">Mississippi</option>
                    <option value="MO">Missouri</option>
                    <option value="MT">Montana</option>
                    <option value="NE">Nebraska</option>
                    <option value="NV">Nevada</option>
                    <option value="NH">New Hampshire</option>
                    <option value="NJ">New Jersey</option>
                    <option value="NM">New Mexico</option>
                    <option value="NY">New York</option>
                    <option value="NC">North Carolina</option>
                    <option value="ND">North Dakota</ option >
                    <option value="OH">Ohio</option>
                    <option value="OK">Oklahoma</option>
                    <option value="OR">Oregon</option>
                    <option value="PA">Pennsylvania</option>
                    <option value="RI">Rhode Island</option>
                    <option value="SC">South Carolina</option>
                    <option value="SD">South Dakota</option>
                    <option value="TN">Tennessee</option>
                    <option value="TX">Texas</option>
                    <option value="UT">Utah</option>
                    <option value="VT">Vermont</option>
                    <option value="VA">Virginia</option>
                    <option value="WA">Washington</option>
                    <option value="WV">West Virginia</option>
                    <option value="WI">Wisconsin</option>
                    <option value="WY">Wyoming</option>
                </select>
            </td>
        </tr>
        <tr>
            <td class="td1"><label for="zip">Zip Code:</label></td>
            <td>
                <input type="text"
                name="zip"
                id="zip"
                maxlength="5"
                pattern="[0-9]{5}"
                title="Enter your zip code"
                required
                placeholder="Zip Code"
                onblur="validateZip()"
                />
                <br>
                <span class="error" id="zipError"></span>
                
            </td>
        </tr>   

        <br>
        <br>

        <tr>
            <td class="td1"><label for="email">Email address:</label></td>
            <td>
                <input type="text" 
                name="email"
                id="email" 
                maxlength="30"
                title="Enter your email address"
                placeholder="xxxx@xxxx.com"
                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                required
                onblur="validateEmail()"
                />
                <br>
                <span class="error" id="emailError"></span>

                
            </td>
        </tr>

        <tr>
            <td class="td1"><label for="phone">Phone Number:</label></td>
            <td>
                <input type="text" 
                name="phone"
                id="phone" 
                pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
                required
                maxlength="12"
                title="Enter your phone number"
                required
                placeholder="XXX-XXX-XXXX"
                onblur="validatePhone()"
                />
                <br>
                <span class="error" id="phoneError"></span>
                
            </td>
        </tr>

        <tr>
            <th colspan="4"><hr></th>
        </tr>

        <tr>
            <th colspan="4">Medical section</th>
        </tr>
<br>
      <br>
      <br>

        <tr>
            <td class="td1"><label for="vaccination">Vaccination Status:</label></td>
            <td>
                <input 
                type="radio" 
                name="vaccination"
                id="v1" 
                value="Yes"
                />
                Yes
                <input 
                type="radio" 
                name="vaccination"
                id="v2" 
                value="No"
                />
                No
            </td>

        </tr>
        <br>
        <br>

        <tr>
            <td class="td1"><label for="insurance">Do you have Insurance?:</label></td>
            <td>
                <input 
                type="radio" 
                name="insurance"
                id="i1" 
                value="Yes"
                />
                Yes
                <input 
                type="radio" 
                name="insurance"
                id="i2" 
                value="No"
                />
                No
            </td>
        </tr>
      <br>
      <br>

        <tr>
            <td class="td1"><label for="history">Have you ever been diagnosed with....</label></td>
            <td>
                <input type="checkbox" id="option1" value="Hypertension"/>
                <label for="option1">Hypertension</label>

                <input type="checkbox" id="option2" value="HIV/AIDS"/>
                <label for="option2">HIV/AIDS</label>

                <input type="checkbox" id="option3" value="Heart Disease"/>
                <label for="option3">Heart Disease</label>

                <input type="checkbox" id="option4" value="COVID-19"/>
                <label for="option4">COVID-19</label>

                <input type="checkbox" id="option5" value="Chickenpox"/>
                <label for="option5">Chickenpox</label>

                <input type="checkbox" id="option6" value="Other"/>
                <label for="option6">Other</label>


        </tr>
      <br>
      <br>

        <tr>
            <td class="td1" align="right">
                <label for="otherHistory">If other, please specify:</label>
            </td>
            <td>
                <textarea
                rows="3"
                cols="50"
                maxlength="400"
                id="notes"
                name="Other"
                title="Enter any other medical history"
                placeholder="Enter any other medical history here...">
                </textarea>
                <span id="description text"></span> 

            </td>
        </tr>
<br>
<br>

        <tr>
            <td class="td1"><label for="range">How bad is your pain (1-10, 10 being the worst):</label></td>
        </td>
            <input
            type="range"
            name="range"
            id="range"
            min="0"
            max="10"   
            value="0"
            />
            <span id="rangeslider"></span> 
       </td>  
     </tr>

        <tr>
            <th colspan="4"><hr></th>
        </tr>

        <tr>
            <th colspan="4">Patient Account Creation</th>
        </tr>
<br>
      <br>
      <br>

        <tr>
            <td class="td1"><label for="username">Username ID:</label></td>
            <td>
                <input
                type="text" 
                name="username"
                id="username" 
                maxlength="20"
                required
                title="Enter your desired username"
                placeholder="Username"
                onblur="validateUsername()"
                />
                <br>
                <span class="error" id="usernameError"></span>
                
            </td>
        </tr>
<br>
        <tr>
            <td class="td1"><label for="password">Password:</label></td>
            <td>
                <input
                type="password" 
                name="password"
                id="password" 
                minlength="8"
                maxlength="20"
                required
                title="password must be at least 8 characters long and contain at least one uppercase letter,
                 one lowercase letter, one number, and one special character"
                placeholder="Password"
                onblur="validatePassword()"
                oninput="validatePassword()"
                onfocus="validatePassword()"
                />
                <br>
                <span class="error" id="passwordError"></span>
                
            </td>
        </tr>
<br>
        <tr>
            <td class="td1"><label for="confirmPassword">Confirm Password:</label></td>
            <td>
                <input
                type="password" 
                name="confirmPassword"
                id="confirmPassword" 
                minlength="8"
                maxlength="20"
                required
                title="Confirm your password"
                placeholder="Confirm Password"
                onblur="ConfirmPassword()"
                oninput="ConfirmPassword()"
                onfocus="ConfirmPassword()"
                />
                <br>
                <span class="error" id="confirmPasswordError"></span>
                
            </td>
        </tr>
<br>
<br>    
        <tr>
            <td class="td1" colspan="4">
            <center>
                <input type="submit" name="submit" id="submit" style="font-family: 'Courier New', Courier, monospace;">
                &nbsp;&nbsp;&nbsp; 
                <input type="reset" name="reset" id="reset" style="font-family: 'Courier New', Courier, monospace;">
                &nbsp;&nbsp;&nbsp;
                <input type="button" name="review" id="review" value="review" style="font-family: 
                'Courier New', Courier, monospace;" onclick="reviewInput()"> 
            </center>
            </td>
        </tr>
    
    </table>
</div>

<div class="password message">
    <span id="msg1"></span> <br>
    <span id="msg2"></span> <br>
    <span id="msg3"></span> <br>
    <span id="msg4"></span> <br>
    <span id="msg5"></span> <br>
    <span id="msg6"></span> <br>
    <span id="msg7"></span> <br>
    <span id="password2error"></span> <br/>
</div>
<center>
<p id="showInput"></p>
</center>

</center>
</form>
     


<footer>
    <p id="footer">  &copy; 2026 Houston Medical Systems. All rights reserved. <a href="https://www.uh.edu/healthcenter/forms-policies/privacy/" target="_blank" rel="noopener noreferrer">Privacy Policy</a></p>
</footer>

 <script
          src="javascript2.js"></script>

            </body>

       </html>
